<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="页面未找到 - SynthInk">
    <meta name="robots" content="noindex">
    <title>404 - 页面未找到 | SynthInk</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%2352b788' d='M12 4c2 2 3 5 2 8-1 2-3 3-4 2-2-1-2-4-1-7 1-2 2-3 3-3zM20 14c-2 2-5 3-8 2-2-1-3-3-2-4 1-2 4-2 7-1 2 1 3 2 3 3zM6 18c-1-3 0-6 3-7 2-1 4 0 4 2 0 2-3 4-6 5-1 0-1 0-1 0z'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- 引入模块化主题系统 -->
    <link rel="stylesheet" href="../css/theme-system.css">
    <style>
        /* ╭────────────────────────────────────────────────────────────╮
           │  SynthInk 404页面设计稿 - 集成主题系统版                          │
           │  概念：404 - 页面迷失在数字深渊中                               │
           ╰────────────────────────────────────────────────────────────╯ */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.6s ease;
        }

        /* ╭── 背景动画 ──╮ */
        .glitch-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .glitch-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
            opacity: 0.3;
            animation: glitch-scan 3s linear infinite;
        }

        @keyframes glitch-scan {
            0% { top: -10%; opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { top: 110%; opacity: 0; }
        }

        /* 故障粒子 */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent-primary);
            opacity: 0.4;
            animation: glitch-float 8s infinite ease-in-out;
        }

        @keyframes glitch-float {
            0%, 100% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% { opacity: 0.6; }
            90% { opacity: 0.4; }
            100% {
                transform: translateY(-100vh) translateX(50px);
                opacity: 0;
            }
        }

        /* ╭── 内容区域 ──╮ */
        .error-container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 0 24px;
        }

        /* 404数字 */
        .error-code {
            font-size: 180px;
            font-weight: 900;
            font-family: var(--font-display);
            line-height: 1;
            position: relative;
            display: inline-block;
            animation: glitch-text 2s infinite;
        }

        .error-code::before,
        .error-code::after {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .error-code::before {
            color: var(--accent-primary);
            animation: glitch-1 0.3s infinite linear alternate-reverse;
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
        }

        .error-code::after {
            color: var(--accent-secondary);
            animation: glitch-2 0.3s infinite linear alternate-reverse;
            clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
        }

        @keyframes glitch-text {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-2px, 2px); }
            94% { transform: translate(2px, -2px); }
            96% { transform: translate(-2px, -2px); }
            98% { transform: translate(2px, 2px); }
        }

        @keyframes glitch-1 {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        @keyframes glitch-2 {
            0% { transform: translate(0); }
            20% { transform: translate(3px, -3px); }
            40% { transform: translate(3px, 3px); }
            60% { transform: translate(-3px, -3px); }
            80% { transform: translate(-3px, 3px); }
            100% { transform: translate(0); }
        }

        /* 错误信息 */
        .error-message {
            font-size: 24px;
            font-weight: 600;
            margin: 24px 0 12px;
            color: var(--text-primary);
        }

        .error-description {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* 终端风格提示 */
        .terminal-hint {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 32px;
            font-family: var(--font-mono);
            font-size: 14px;
            text-align: left;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }

        .terminal-line {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .terminal-line:last-child {
            margin-bottom: 0;
        }

        .terminal-prompt {
            color: var(--accent-primary);
        }

        .terminal-cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background: var(--accent-primary);
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* 返回按钮 */
        .back-home-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            border-radius: 12px;
            color: var(--bg-primary);
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition-fast) var(--transition-smooth);
        }

        .back-home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px var(--glow-primary);
        }

        .back-home-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* 底部链接 */
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 40px;
        }

        .footer-link {
            font-size: 14px;
            color: var(--text-tertiary);
            text-decoration: none;
            transition: var(--transition-fast);
        }

        .footer-link:hover {
            color: var(--accent-primary);
        }

        /* 左上角Logo */
        .logo {
            position: fixed;
            top: 24px;
            left: 5%;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            z-index: 10;
            transition: var(--transition-fast);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            border: 2px solid var(--accent-primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: logo-pulse 3s ease-in-out infinite;
            color: var(--accent-primary);
            background: var(--bg-primary);
        }

        @keyframes logo-pulse {
            0%, 100% { box-shadow: 0 0 0 0 var(--glow-primary); }
            50% { box-shadow: 0 0 15px 3px var(--glow-strong); }
        }

        .logo-icon svg {
            width: 20px;
            height: 20px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: var(--font-display);
        }

        /* ╭── 响应式 ──╮ */
        @media (max-width: 768px) {
            .logo {
                top: 16px;
                left: 4%;
            }

            .logo-icon {
                width: 36px;
                height: 36px;
            }

            .logo-icon svg {
                width: 18px;
                height: 18px;
            }

            .logo-text {
                font-size: 18px;
            }

            .error-code {
                font-size: 120px;
            }

            .error-message {
                font-size: 20px;
            }

            .terminal-hint {
                font-size: 12px;
                padding: 16px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- 左上角Logo -->
    <a href="home.html" class="logo">
        <div class="logo-icon">
            <!-- Spin Logo - 三瓣旋转 -->
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 4c2 2 3 5 2 8-1 2-3 3-4 2-2-1-2-4-1-7 1-2 2-3 3-3z" fill="currentColor" opacity="0.9"/>
                <path d="M20 14c-2 2-5 3-8 2-2-1-3-3-2-4 1-2 4-2 7-1 2 1 3 2 3 3z" fill="currentColor" opacity="0.8"/>
                <path d="M6 18c-1-3 0-6 3-7 2-1 4 0 4 2 0 2-3 4-6 5-1 0-1 0-1 0z" fill="currentColor" opacity="0.85"/>
            </svg>
        </div>
        <span class="logo-text">SynthInk</span>
    </a>

    <!-- 背景故障效果 -->
    <div class="glitch-bg" id="glitchBg"></div>
    
    <!-- 粒子效果 -->
    <div class="particles" id="particles"></div>

    <!-- 错误内容 -->
    <div class="error-container">
        <!-- 404代码 -->
        <h1 class="error-code">404</h1>

        <!-- 错误信息 -->
        <h2 class="error-message">页面未找到</h2>
        <p class="error-description">
            你寻找的页面似乎已经迷失在数字深渊中，或者它从未存在过。
        </p>

        <!-- 终端提示 -->
        <div class="terminal-hint">
            <div class="terminal-line">
                <span class="terminal-prompt">$</span>
                <span>find /pages -name "target"</span>
            </div>
            <div class="terminal-line">
                <span class="terminal-prompt">></span>
                <span style="color: var(--accent-secondary);">Error: File not found</span>
            </div>
            <div class="terminal-line">
                <span class="terminal-prompt">$</span>
                <span>cd ~<span class="terminal-cursor"></span></span>
            </div>
        </div>

        <!-- 返回按钮 -->
        <a href="home.html" class="back-home-btn">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            返回首页
        </a>

        <!-- 底部链接 -->
        <div class="footer-links">
            <a href="post-list.html" class="footer-link">文章列表</a>
            <a href="profile.html" class="footer-link">个人中心</a>
            <a href="#" class="footer-link" onclick="history.back()">返回上页</a>
        </div>
    </div>

    <!-- 引入主题系统JS -->
    <script src="../js/theme-system.js"></script>
    <script>
        // 生成故障线条
        const glitchBg = document.getElementById('glitchBg');
        for (let i = 0; i < 5; i++) {
            const line = document.createElement('div');
            line.className = 'glitch-line';
            line.style.animationDelay = `${i * 0.6}s`;
            glitchBg.appendChild(line);
        }

        // 生成粒子
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 8 + 's';
            particle.style.animationDuration = (6 + Math.random() * 4) + 's';
            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>
