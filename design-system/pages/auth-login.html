<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - SynthInk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ╭────────────────────────────────────────────────────────────╮
           │  SynthInk 登录页设计稿                                        │
           │  概念：凌晨两点，光标在黑暗中等待下一行代码                      │
           │  彩蛋提示：「// 凌晨两点的光标，还在等待下一行代码」              │
           ╰────────────────────────────────────────────────────────────╯ */
        
        :root {
            /* 赛博霓虹主题（默认） */
            --theme-primary: #00f5ff;
            --theme-secondary: #ff00a0;
            --theme-tertiary: #ffea00;
            --bg-deep: #0a0a0f;
            --bg-mid: #12121a;
            --bg-light: #1a1a25;
            --bg-card: rgba(18, 18, 26, 0.95);
            --text-main: #ffffff;
            --text-sub: #a0a0b0;
            --text-weak: #606070;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(0, 245, 255, 0.3);
            
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            --duration-fast: 200ms;
            --duration-normal: 300ms;
            --duration-slow: 500ms;
        }

        /* 极光紫境主题 */
        [data-theme="aurora"] {
            --theme-primary: #b829dd;
            --theme-secondary: #00d4aa;
            --theme-tertiary: #ff6b6b;
            --bg-deep: #0f0a1a;
            --bg-mid: #1a1225;
            --bg-light: #251a35;
            --bg-card: rgba(26, 18, 37, 0.95);
            --text-sub: #b8a8c8;
            --text-weak: #705a80;
            --border-glow: rgba(184, 41, 221, 0.3);
        }

        /* 暖阳橙光主题 */
        [data-theme="sunset"] {
            --theme-primary: #ff6b35;
            --theme-secondary: #f7931e;
            --theme-tertiary: #ffd93d;
            --bg-deep: #1a0f0a;
            --bg-mid: #251812;
            --bg-light: #35221a;
            --bg-card: rgba(37, 24, 18, 0.95);
            --text-main: #fff5f0;
            --text-sub: #d4a890;
            --text-weak: #906850;
            --border-glow: rgba(255, 107, 53, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.6s ease;
        }

        /* ╭── 背景粒子效果 ──╮ */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--theme-primary);
            border-radius: 50%;
            opacity: 0.4;
            box-shadow: 0 0 6px var(--theme-primary);
            animation: float-up 20s infinite ease-in-out;
        }

        @keyframes float-up {
            0%, 100% {
                transform: translateY(100vh) scale(0.5);
                opacity: 0;
            }
            10% { opacity: 0.6; }
            90% { opacity: 0.4; }
            100% {
                transform: translateY(-100vh) scale(1.2);
                opacity: 0;
            }
        }

        /* 极光主题：星点闪烁 */
        [data-theme="aurora"] .particle {
            animation: twinkle 4s infinite ease-in-out;
            width: 2px;
            height: 2px;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.5); }
        }

        /* 暖阳主题：落叶飘落 */
        [data-theme="sunset"] .particle {
            width: 6px;
            height: 6px;
            border-radius: 0 50% 50% 50%;
            transform: rotate(45deg);
            animation: leaf-fall 15s infinite ease-in-out;
        }

        @keyframes leaf-fall {
            0% {
                transform: translateY(-10vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.6; }
            90% { opacity: 0.4; }
            100% {
                transform: translateY(110vh) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* ╭── 主题切换器 ──╮ */
        .theme-switcher {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 100;
            display: flex;
            gap: 8px;
            padding: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            backdrop-filter: blur(20px);
        }

        .theme-btn {
            width: 32px;
            height: 32px;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--duration-fast) var(--ease-smooth);
            position: relative;
        }

        .theme-btn:hover {
            transform: scale(1.1);
        }

        .theme-btn.active {
            border-color: var(--text-main);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .theme-btn.cyber {
            background: linear-gradient(135deg, #00f5ff, #ff00a0);
        }

        .theme-btn.aurora {
            background: linear-gradient(135deg, #b829dd, #00d4aa);
        }

        .theme-btn.sunset {
            background: linear-gradient(135deg, #ff6b35, #f7931e);
        }

        /* ╭── 登录卡片 ──╮ */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 0 24px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            padding: 48px 40px;
            backdrop-filter: blur(20px);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.02);
            animation: card-enter 0.6s var(--ease-smooth);
        }

        @keyframes card-enter {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ╭── Logo区域 ──╮ */
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border: 2px solid var(--theme-primary);
            border-radius: 16px;
            margin-bottom: 20px;
            position: relative;
            animation: logo-pulse 3s ease-in-out infinite;
        }

        @keyframes logo-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 245, 255, 0.4); }
            50% { box-shadow: 0 0 20px 5px rgba(0, 245, 255, 0.2); }
        }

        [data-theme="aurora"] .logo {
            animation: logo-pulse-aurora 3s ease-in-out infinite;
        }

        @keyframes logo-pulse-aurora {
            0%, 100% { box-shadow: 0 0 0 0 rgba(184, 41, 221, 0.4); }
            50% { box-shadow: 0 0 20px 5px rgba(184, 41, 221, 0.2); }
        }

        [data-theme="sunset"] .logo {
            animation: logo-pulse-sunset 3s ease-in-out infinite;
        }

        @keyframes logo-pulse-sunset {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 53, 0.4); }
            50% { box-shadow: 0 0 20px 5px rgba(255, 107, 53, 0.2); }
        }

        .logo svg {
            width: 32px;
            height: 32px;
            fill: var(--theme-primary);
        }

        .brand-name {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--theme-primary), var(--theme-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-tagline {
            font-size: 13px;
            color: var(--text-weak);
            margin-top: 8px;
            letter-spacing: 0.1em;
        }

        /* ╭── 表单区域 ──╮ */
        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-sub);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-deep);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 15px;
            font-family: inherit;
            transition: var(--duration-fast) var(--ease-smooth);
            outline: none;
        }

        .form-input::placeholder {
            color: var(--text-weak);
        }

        .form-input:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .form-input:focus {
            border-color: var(--theme-primary);
            box-shadow: 0 0 0 3px var(--border-glow);
        }

        /* 光标闪烁动画 */
        .form-input:focus::after {
            content: '|';
            animation: cursor-blink 1s step-end infinite;
        }

        /* ╭── 密码强度指示器（彩蛋） ──╮ */
        .password-strength {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            opacity: 0;
            transform: translateY(-10px);
            transition: var(--duration-fast) var(--ease-smooth);
        }

        .password-strength.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .strength-hearts {
            display: flex;
            gap: 4px;
        }

        .heart {
            width: 12px;
            height: 12px;
            background: var(--text-weak);
            clip-path: polygon(50% 0%, 100% 35%, 100% 70%, 50% 100%, 0% 70%, 0% 35%);
            transition: var(--duration-fast);
        }

        .heart.active {
            background: var(--theme-primary);
            box-shadow: 0 0 8px var(--theme-primary);
        }

        .strength-text {
            font-size: 12px;
            color: var(--text-weak);
        }

        /* ╭── 选项区域 ──╮ */
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .checkbox-wrapper input {
            display: none;
        }

        .checkbox-custom {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border-subtle);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--duration-fast);
        }

        .checkbox-wrapper:hover .checkbox-custom {
            border-color: var(--theme-primary);
        }

        .checkbox-wrapper input:checked + .checkbox-custom {
            background: var(--theme-primary);
            border-color: var(--theme-primary);
        }

        .checkbox-custom::after {
            content: '';
            width: 5px;
            height: 9px;
            border: solid var(--bg-deep);
            border-width: 0 2px 2px 0;
            transform: rotate(45deg) translate(-1px, -1px);
            opacity: 0;
            transition: var(--duration-fast);
        }

        .checkbox-wrapper input:checked + .checkbox-custom::after {
            opacity: 1;
        }

        .checkbox-label {
            font-size: 13px;
            color: var(--text-sub);
        }

        .forgot-link {
            font-size: 13px;
            color: var(--theme-primary);
            text-decoration: none;
            transition: var(--duration-fast);
        }

        .forgot-link:hover {
            text-shadow: 0 0 10px var(--border-glow);
        }

        /* ╭── 登录按钮 ──╮ */
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--theme-primary), var(--theme-secondary));
            border: none;
            border-radius: 12px;
            color: var(--bg-deep);
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: var(--duration-fast) var(--ease-smooth);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px var(--border-glow);
        }

        .login-btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* 涟漪效果 */
        .login-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,255,0.3) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .login-btn:hover::after {
            opacity: 1;
        }

        /* ╭── 分隔线 ──╮ */
        .divider {
            display: flex;
            align-items: center;
            margin: 28px 0;
            color: var(--text-weak);
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-subtle), transparent);
        }

        .divider span {
            padding: 0 16px;
        }

        /* ╭── 社交登录 ──╮ */
        .social-login {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .social-btn {
            width: 44px;
            height: 44px;
            background: var(--bg-mid);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--duration-fast) var(--ease-smooth);
        }

        .social-btn:hover {
            border-color: var(--theme-primary);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--border-glow);
        }

        .social-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--text-sub);
            transition: var(--duration-fast);
        }

        .social-btn:hover svg {
            fill: var(--theme-primary);
        }

        /* ╭── 底部链接 ──╮ */
        .footer-text {
            text-align: center;
            margin-top: 28px;
            font-size: 14px;
            color: var(--text-sub);
        }

        .footer-text a {
            color: var(--theme-primary);
            text-decoration: none;
            font-weight: 500;
            transition: var(--duration-fast);
        }

        .footer-text a:hover {
            text-shadow: 0 0 10px var(--border-glow);
        }

        /* ╭── 响应式 ──╮ */
        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
            }

            .brand-name {
                font-size: 24px;
            }

            .theme-switcher {
                top: 16px;
                right: 16px;
            }
        }

        /* 减少动画偏好 */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- 背景粒子 -->
    <div class="particles" id="particles"></div>

    <!-- 主题切换器 -->
    <div class="theme-switcher">
        <button class="theme-btn cyber active" data-theme="cyber" title="赛博霓虹"></button>
        <button class="theme-btn aurora" data-theme="aurora" title="极光紫境"></button>
        <button class="theme-btn sunset" data-theme="sunset" title="暖阳橙光"></button>
    </div>

    <!-- 登录卡片 -->
    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="logo-section">
                <div class="logo">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h1 class="brand-name">SynthInk</h1>
                <p class="brand-tagline">人机共创的写作空间</p>
            </div>

            <!-- 登录表单 -->
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">用户名或邮箱</label>
                    <div class="input-wrapper">
                        <input type="text" class="form-input" placeholder="请输入用户名或邮箱" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">密码</label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
                    </div>
                    <!-- 密码强度指示器（彩蛋） -->
                    <div class="password-strength" id="passwordStrength">
                        <div class="strength-hearts">
                            <div class="heart"></div>
                            <div class="heart"></div>
                            <div class="heart"></div>
                        </div>
                        <span class="strength-text">密码强度</span>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" checked>
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-label">记住我</span>
                    </label>
                    <a href="#" class="forgot-link">忘记密码？</a>
                </div>

                <button type="submit" class="login-btn">登录</button>
            </form>

            <!-- 分隔线 -->
            <div class="divider">
                <span>或使用以下方式</span>
            </div>

            <!-- 社交登录 -->
            <div class="social-login">
                <button class="social-btn" title="GitHub">
                    <svg viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                </button>
                <button class="social-btn" title="Google">
                    <svg viewBox="0 0 24 24"><path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/></svg>
                </button>
            </div>

            <!-- 底部链接 -->
            <p class="footer-text">
                还没有账号？<a href="auth-register.html">立即注册</a>
            </p>
        </div>
    </div>

    <script>
        // 生成背景粒子
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 25;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        // 主题切换
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const theme = btn.dataset.theme;
                document.documentElement.setAttribute('data-theme', theme);
                
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // 密码强度检测（彩蛋）
        const passwordInput = document.getElementById('password');
        const strengthIndicator = document.getElementById('passwordStrength');
        const hearts = document.querySelectorAll('.heart');

        passwordInput.addEventListener('input', (e) => {
            const value = e.target.value;
            
            if (value.length > 0) {
                strengthIndicator.classList.add('visible');
                
                let strength = 0;
                if (value.length >= 6) strength++;
                if (value.length >= 10) strength++;
                if (/[A-Z]/.test(value) && /[0-9]/.test(value)) strength++;
                
                hearts.forEach((heart, index) => {
                    heart.classList.toggle('active', index < strength);
                });
            } else {
                strengthIndicator.classList.remove('visible');
            }
        });

        // 按钮涟漪效果
        document.querySelector('.login-btn').addEventListener('mousemove', (e) => {
            const rect = e.target.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;
            e.target.style.setProperty('--x', x + '%');
            e.target.style.setProperty('--y', y + '%');
        });

        // 表单提交
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // 模拟登录成功动画
            const btn = document.querySelector('.login-btn');
            btn.textContent = '登录中...';
            btn.style.opacity = '0.8';
            
            setTimeout(() => {
                btn.textContent = '登录成功！';
                btn.style.background = 'linear-gradient(135deg, #00d4aa, #00a8e8)';
            }, 1500);
        });

        createParticles();
